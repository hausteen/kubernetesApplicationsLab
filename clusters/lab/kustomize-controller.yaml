---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: applications-cilium
  namespace: flux-system
spec:
  sourceRef:
    kind: GitRepository
    name: homelab-cluster-lab
    namespace: flux-system
  interval: 10m
  timeout: 5m
  prune: true
  wait: true
  path: "applications/cilium"
...
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: configurations-cilium-phase1
  namespace: flux-system
spec:
  dependsOn:
  - name: applications-cilium
    namespace: flux-system
  sourceRef:
    kind: GitRepository
    name: homelab-cluster-lab
    namespace: flux-system
  interval: 10m
  timeout: 5m
  prune: true
  wait: true
  path: "configurations/cilium/phase1"
...
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: applications-gateway-api-crds
  namespace: flux-system
spec:
  sourceRef:
    kind: GitRepository
    name: homelab-cluster-lab
    namespace: flux-system
  interval: 10m
  timeout: 5m
  prune: true
  wait: true
  path: "applications/gateway-api-crds"
...
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: applications-cert-manager
  namespace: flux-system
spec:
  dependsOn:
  - name: configurations-cilium-phase1
    namespace: flux-system
  sourceRef:
    kind: GitRepository
    name: homelab-cluster-lab
    namespace: flux-system
  interval: 10m
  timeout: 5m
  prune: true
  wait: true
  path: "applications/cert-manager"
...
