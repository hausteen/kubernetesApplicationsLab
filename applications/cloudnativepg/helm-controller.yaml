apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudnativepg
  namespace: flux-system
spec:
  interval: 15m
  timeout: 5m
  install:
    crds: Create
    createNamespace: false
    serverSideApply: true
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    crds: Create
    serverSideApply: enabled
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  releaseName: cloudnative-pg
  targetNamespace: cnpg-system
  chartRef:
    kind: HelmChart
    name: cloudnativepg
    namespace: flux-system
  values:
    config:
      clusterWide: false
    fullnameOverride: cnpg-controller-manager
