---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: cloudnativepg
  namespace: flux-system
spec:
  interval: 12h
  url: https://cloudnative-pg.github.io/charts
...
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmChart
metadata:
  name: cloudnativepg
  namespace: flux-system
spec:
  chart: cloudnative-pg
  version: "0.28.x"
  sourceRef:
    kind: HelmRepository
    name: cloudnativepg
  interval: 24h
  reconcileStrategy: ChartVersion
...
