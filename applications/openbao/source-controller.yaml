---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: openbao
  namespace: flux-system
spec:
  interval: 12h
  url: https://openbao.github.io/openbao-helm
...
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmChart
metadata:
  name: openbao
  namespace: flux-system
spec:
  chart: openbao
  version: "0.28.x"
  sourceRef:
    kind: HelmRepository
    name: openbao
  interval: 24h
  reconcileStrategy: ChartVersion
...
