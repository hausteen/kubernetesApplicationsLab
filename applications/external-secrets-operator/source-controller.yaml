---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: external-secrets-operator
  namespace: flux-system
spec:
  interval: 12h
  url: https://charts.external-secrets.io
...
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmChart
metadata:
  name: external-secrets-operator
  namespace: flux-system
spec:
  chart: external-secrets
  version: "2.5.x"
  sourceRef:
    kind: HelmRepository
    name: external-secrets-operator
  interval: 24h
  reconcileStrategy: ChartVersion
...
