apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: front-door
  namespace: gateway-api
spec:
  gatewayClassName: nginx-gateway-fabric
  infrastructure:
    parametersRef:
        group: gateway.nginx.org
        kind: NginxProxy
        name: front-door
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces:
        from: All
  - name: https
    protocol: HTTPS
    port: 443
    allowedRoutes:
      namespaces:
        from: All
    tls:
      mode: Terminate
      certificateRefs:
      - name: front-door
        namespace: gateway-api
        kind: Secret
      options: # this section is specifically for nginx gateway fabric
        nginx.org/ssl-protocols: TLSv1.3
  - name: dns-udp
    protocol: UDP
    port: 53
    allowedRoutes:
      namespaces:
        from: All
  - name: dns-tcp
    protocol: TCP
    port: 53
    allowedRoutes:
      namespaces:
        from: All
