---
apiVersion: v1
kind: ConfigMap
metadata:
  name: waypoint-gateway-options
  namespace: cert-manager
data:
  deployment: |
    spec:
      template:
        spec:
          securityContext:
            seccompProfile:
              type: RuntimeDefault
...
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: waypoint
  namespace: cert-manager
  labels:
    istio.io/waypoint-for: service # https://istio.io/latest/docs/ambient/usage/waypoint/#waypoint-traffic-types
spec:
  gatewayClassName: istio-waypoint
  infrastructure:
    parametersRef:
      kind: ConfigMap
      name: waypoint-gateway-options
  listeners:
  - name: mesh
    port: 15008
    protocol: HBONE
...
# I'm not sure on how the front-door gateway with waypoints is supposed to work yet.
# change this waypoint to be for nginx-gateway-fabric. we do not need a waypoint for cert-manager
