apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: authentik-postgres
  namespace: authentik
spec:
  secretName: authentik-postgres-certificate
  secretTemplate:
    labels:
      cnpg.io/reload: ""
  issuerRef:
    name: hunt-internal
    kind: ClusterIssuer
    group: cert-manager.io
  privateKey:
    rotationPolicy: Always
    algorithm: ECDSA
    size: 256
  isCA: false
  subject:
    countries:
    - usa
    organizations:
    - hunt
  dnsNames:
  - authentik-rw
  - authentik-rw.cnpg-system
  - authentik-rw.cnpg-system.svc
  - authentik-rw.cnpg-system.svc.cluster.local
  - authentik-r
  - authentik-r.cnpg-system
  - authentik-r.cnpg-system.svc
  - authentik-r.cnpg-system.svc.cluster.local
  - authentik-ro
  - authentik-ro.cnpg-system
  - authentik-ro.cnpg-system.svc
  - authentik-ro.cnpg-system.svc.cluster.local
  duration: 720h # 30 days * 24 hours
  renewBefore: 120h # 5 days before it ends. 5 days * 24 hours
