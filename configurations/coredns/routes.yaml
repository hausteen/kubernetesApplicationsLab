---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: UDPRoute
metadata:
  name: coredns
  namespace: coredns
spec:
  parentRefs:
  - name: ingress
    sectionName: dns-udp
    namespace: gateway-api
    group: gateway.networking.k8s.io
    kind: Gateway
  rules:
  - backendRefs:
    - name: coredns
      port: 53
      weight: 1
      kind: Service
...
---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TCPRoute
metadata:
  name: coredns
  namespace: coredns
spec:
  parentRefs:
  - name: ingress
    sectionName: dns-tcp
    namespace: gateway-api
    group: gateway.networking.k8s.io
    kind: Gateway
  rules:
  - backendRefs:
    - name: coredns
      port: 53
      weight: 1
      kind: Service
...
