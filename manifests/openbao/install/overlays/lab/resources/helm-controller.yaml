apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openbao
  namespace: flux-system
spec:
  interval: 15m
  timeout: 5m
  install:
    crds: Create
    createNamespace: false
    serverSideApply: true
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    crds: Create
    serverSideApply: enabled
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  releaseName: openbao
  targetNamespace: openbao
  chartRef:
    kind: HelmChart
    name: openbao
    namespace: flux-system
  values:
    global:
      tlsDisable: false
    ui:
      enabled: true
    csi:
      enabled: false
    injector:
      enabled: false
    server:
      auditStorage:
        enabled: false
      dataStorage:
        size: 5Gi
        # storageClass: no-replication
        storageClass: replication
        accessMode: ReadWriteOncePod
      logFormat: json
      logLevel: info
      livenessProbe:
        enabled: true
      readinessProbe:
        enabled: true
      statefulSet:
        securityContext:
          pod:
            runAsNonRoot: true
            runAsGroup: 1000
            runAsUser: 100
            fsGroup: 1000
          container:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            seccompProfile:
              type: RuntimeDefault
      extraEnvironmentVars:
        BAO_CACERT: /openbao/secrets/ca.crt
      volumeMounts:
      - name: secrets
        mountPath: /openbao/secrets/
        readOnly: true
      volumes:
      - name: secrets
        projected: # look into clusterTrustBundle projected volumes to use here instead of a configmap for the ca trust bundle
          sources:
          - secret:
              name: openbao-current-unseal-key
          - secret:
              name: openbao-previous-unseal-key
          - secret:
              name: openbao-admin-password
          - secret:
              name: openbao-server-tls
              items:
              - key: tls.crt
                path: tls.crt
              - key: tls.key
                path: tls.key
          - configMap:
              name: hunt-internal-trust-bundle
              items:
              - key: ca.crt
                path: ca.crt
      serviceAccount:
        name: openbao-server
