apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: flux-system
spec:
  interval: 15m
  timeout: 5m
  install:
    crds: Create
    createNamespace: false
    serverSideApply: true
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    crds: Create
    serverSideApply: enabled
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  releaseName: cert-manager
  targetNamespace: cert-manager
  chartRef:
    kind: OCIRepository
    name: cert-manager
    namespace: flux-system
  values:
    crds:
      enabled: true
    global:
      leaderElection:
        namespace: cert-manager
