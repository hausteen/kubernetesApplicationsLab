apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: hunt-internal-certificate-authority
  namespace: cert-manager
spec:
  secretName: hunt-internal-certificate-authority
  issuerRef:
    name: self-signed
    kind: Issuer
    group: cert-manager.io
  privateKey:
    rotationPolicy: Always
    algorithm: ECDSA
    size: 256
  isCA: true
  subject:
    countries:
    - usa
    organizations:
    - hunt
  commonName: hunt-internal-certificate-authority
  duration: 87600h # 10 years * 365 days * 24 hours
  renewBefore: 4320h # 6 months before it ends. 180 days * 24 hours
