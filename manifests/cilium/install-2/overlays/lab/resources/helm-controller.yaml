apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: flux-system
spec:
  interval: 15m
  timeout: 5m
  install:
    crds: CreateReplace
    createNamespace: false
    serverSideApply: true
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    crds: CreateReplace
    serverSideApply: enabled
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  releaseName: cilium
  targetNamespace: kube-system
  chartRef:
    kind: OCIRepository
    name: cilium
    namespace: flux-system
  values: # copied from either of the values files in this directory. currently matches values-yes-cni-chaining.yaml
    cgroup:
      autoMount:
        enabled: false
      hostRoot: /sys/fs/cgroup
    ipam:
      mode: kubernetes
    kubeProxyReplacement: true
    kubeProxyReplacementHealthzBindAddr: 0.0.0.0:10256
    securityContext:
      capabilities:
        ciliumAgent:
        - CHOWN
        - DAC_OVERRIDE
        - FOWNER
        - IPC_LOCK
        - KILL
        - NET_ADMIN
        - NET_RAW
        - SETGID
        - SETUID
        - SYS_ADMIN
        - SYS_RESOURCE
        cleanCiliumState:
        - NET_ADMIN
        - SYS_ADMIN
        - SYS_RESOURCE
    k8sServiceHost: localhost
    k8sServicePort: 7445
    cluster:
      name: lab
      id: 1
    encryption:
      enabled: true
      type: wireguard
      nodeEncryption: true
    gatewayAPI:
      enabled: false
    l7Proxy: false
    hubble:
      enabled: true
      metrics:
        enabled:
        - dns
        - drop
        - flow
        - http
        - icmp
        - tcp
        - udp
        - port-distribution
      relay:
        enabled: true
      ui:
        enabled: true
    k8sClientRateLimit:
      burst: 100
      qps: 50 # services * (1 / leaseRenewDeadline)
    l2announcements:
      enabled: true
      leaseDuration: 8s
      leaseRenewDeadline: 4s
      leaseRetryPeriod: 2s
    bpf:
      masquerade: false
    socketLB:
      hostNamespaceOnly: true
    cni:
      exclusive: false
