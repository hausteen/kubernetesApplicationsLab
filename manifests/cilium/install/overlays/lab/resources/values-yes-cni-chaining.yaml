# this file is here simply for ease of copying into helm-controller.yaml
cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup
ipam:
  mode: kubernetes
kubeProxyReplacement: true
kubeProxyReplacementHealthzBindAddr: 0.0.0.0:10256
securityContext:
  capabilities:
    ciliumAgent:
    - CHOWN
    - DAC_OVERRIDE
    - FOWNER
    - IPC_LOCK
    - KILL
    - NET_ADMIN
    - NET_RAW
    - SETGID
    - SETUID
    - SYS_ADMIN
    - SYS_RESOURCE
    cleanCiliumState:
    - NET_ADMIN
    - SYS_ADMIN
    - SYS_RESOURCE
k8sServiceHost: localhost
k8sServicePort: 7445
cluster:
  name: lab
  id: 1
encryption:
  enabled: true
  type: wireguard
  nodeEncryption: true
gatewayAPI:
  enabled: false
l7Proxy: false
hubble:
  enabled: true
  metrics:
    enabled:
    - dns
    - drop
    - flow
    - http
    - icmp
    - tcp
    - udp
    - port-distribution
  relay:
    enabled: true
  ui:
    enabled: true
k8sClientRateLimit:
  burst: 100
  qps: 50 # services * (1 / leaseRenewDeadline)
l2announcements:
  enabled: true
  leaseDuration: 8s
  leaseRenewDeadline: 4s
  leaseRetryPeriod: 2s
bpf:
  masquerade: false
socketLB:
  hostNamespaceOnly: true
cni:
  exclusive: false
