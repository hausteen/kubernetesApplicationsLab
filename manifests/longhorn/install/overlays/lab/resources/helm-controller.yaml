apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: flux-system
spec:
  interval: 15m
  timeout: 5m
  install:
    crds: Create
    createNamespace: false
    serverSideApply: true
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    crds: Create
    serverSideApply: enabled
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  releaseName: longhorn
  targetNamespace: longhorn-system
  chartRef:
    kind: HelmChart
    name: longhorn
    namespace: flux-system
  values:
    global:
      timezone: UTC
    defaultSettings:
      allowCollectingLonghornUsageMetrics: false
      defaultDataLocality: best-effort
      defaultDataPath: /var/mnt/storage # talos mounts the user volume config here
      defaultLonghornStaticStorageClass: replication # my custom storage class
      defaultReplicaCount: 2
      deletingConfirmationFlag: true
      logLevel: Info
      replicaAutoBalance: best-effort
      snapshotMaxCount: 2
      storageMinimalAvailablePercentage: 5
      storageReservedPercentageForDefaultDisk: 0
      upgradeChecker: false
      v1DataEngine: true
      v2DataEngine: false
    longhornDriver:
      log:
        format: plain # json
    longhornManager:
      log:
        format: plain # json
    persistence:
      dataEngine: v1
      defaultClass: false
      defaultClassReplicaCount: 2
      defaultDataLocality: best-effort
      reclaimPolicy: Delete # Retain
      volumeBindingMode: WaitForFirstConsumer
    preUpgradeChecker:
      jobEnabled: false
